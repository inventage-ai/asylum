name: Dev Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build linux targets
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=dev -X main.commit=${{ github.sha }}" -o build/asylum-linux-amd64 ./cmd/asylum
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=dev -X main.commit=${{ github.sha }}" -o build/asylum-linux-arm64 ./cmd/asylum

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: build/asylum-*

  build-darwin:
    uses: ./.github/workflows/build-sign-darwin.yml
    with:
      version: dev
      commit: ${{ github.sha }}
    secrets:
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}

  dev-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: build
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: cd build && sha256sum asylum-* > checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'build/asylum-*'

      - name: Delete existing dev release
        run: gh release delete dev --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create dev pre-release
        run: |
          gh release create dev \
            --prerelease \
            --title "Development Build" \
            --notes "Rolling build from \`main\` ($(date -u '+%Y-%m-%d %H:%M UTC')). Install with: \`asylum self-update --dev\`" \
            build/asylum-* build/checksums.txt
        env:
          GH_TOKEN: ${{ github.token }}
